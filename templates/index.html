<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyGist — clear study notes from PDFs &amp; YouTube</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container">
        <header>
            <div class="brand">
                <svg class="logo" viewBox="0 0 64 64" width="44" height="44" aria-hidden="true">
                    <defs>
                        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0" stop-color="#7aa2f7"/>
                            <stop offset="1" stop-color="#9d7cf7"/>
                        </linearGradient>
                    </defs>
                    <rect width="64" height="64" rx="16" fill="url(#g)"/>
                    <rect x="16" y="22" width="24" height="4" rx="2" fill="#fff"/>
                    <rect x="16" y="31" width="30" height="4" rx="2" fill="#fff" opacity=".9"/>
                    <rect x="16" y="40" width="20" height="4" rx="2" fill="#fff" opacity=".75"/>
                    <path d="M48 11 C49 16 50 17 55 18 C50 19 49 20 48 25 C47 20 46 19 41 18 C46 17 47 16 48 11Z" fill="#fff"/>
                </svg>
                <h1>StudyGist</h1>
            </div>
            <p class="subtitle">Turn your PDFs and YouTube links into clear, structured study notes.</p>
        </header>

        <section class="card">
            <label for="language">Summary language</label>
            <select id="language">
                <option value="English">English</option>
                <option value="Turkish">Turkish</option>
                <option value="Azerbaijani">Azerbaijani</option>
                <option value="Russian">Russian</option>
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
                <option value="German">German</option>
                <option value="Italian">Italian</option>
                <option value="Portuguese">Portuguese</option>
                <option value="Chinese">Chinese</option>
                <option value="Japanese">Japanese</option>
                <option value="Arabic">Arabic</option>
            </select>
        </section>

        <section class="card">
            <h2>1. Upload PDF notes</h2>
            <form id="pdf-form" class="upload-form">
                <input type="file" name="file" accept="application/pdf" required>
                <button type="submit">Summarize PDF</button>
            </form>
        </section>

        <section class="card">
            <h2>2. Paste a YouTube link</h2>
            <form id="youtube-form" class="upload-form">
                <input type="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>
                <button type="submit">Summarize video link</button>
            </form>
        </section>

        <section class="card">
            <h2>3. Humanize AI text</h2>
            <form id="humanize-form" class="upload-form">
                <textarea name="text" rows="5" placeholder="Paste AI-generated text here..." required></textarea>
                <button type="submit">Humanize</button>
            </form>
        </section>

        <section class="card output-card">
            <h2>Output</h2>
            <div id="status" class="status"></div>
            <pre id="output" class="output">Your result will appear here.</pre>
        </section>
    </main>

    <script>
        const languageInput = document.getElementById("language");
        const output = document.getElementById("output");
        const status = document.getElementById("status");

        function setStatus(msg, isError = false) {
            status.textContent = msg;
            status.className = "status" + (isError ? " error" : "");
        }

        async function postForm(url, formData) {
            setStatus("Working...");
            output.textContent = "";
            try {
                const res = await fetch(url, { method: "POST", body: formData });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Request failed");
                setStatus(`Done · source: ${data.source}`);
                output.textContent = data.summary;
            } catch (e) {
                setStatus(e.message, true);
            }
        }

        document.getElementById("pdf-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append("language", languageInput.value);
            postForm("/summarize/pdf", fd);
        });

        document.getElementById("youtube-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            fd.append("language", languageInput.value);
            postForm("/summarize/youtube", fd);
        });

        document.getElementById("humanize-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const text = e.target.elements["text"].value;
            setStatus("Working...");
            output.textContent = "";
            try {
                const res = await fetch("/humanize", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Request failed");
                setStatus("Done");
                output.textContent = data.result;
            } catch (err) {
                setStatus(err.message, true);
            }
        });
    </script>
</body>
</html>
